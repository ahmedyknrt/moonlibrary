<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>˚ʚ♡ɞ˚ our arcade</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html{
  image-rendering: pixelated;
  filter: contrast(80%);
  background: url(https://i.pinimg.com/736x/df/cb/f6/dfcbf62db587f25f91ca5d811ff88153.jpg);
  background-size: 10%;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  width: 800px;
  margin: 0 auto;
  margin-top: 25px;
  margin-bottom: 25px;
  line-height: 16px;
  font-size: 16px;
  letter-spacing: 1px;
  font-family: "ms pgothic", sans-serif;
  color: #ae957f;
  text-align: justify;
  background: transparent;
}

::-webkit-scrollbar { display: none; }
.scrollbar{ scrollbar-width: none; -ms-overflow-style: none; }

a{ color: #c49dae; text-decoration: none; }
a:hover{ color: #a1ceed; letter-spacing: 3px; transition: 0.2s; }

.outerlace{
  border-width: 5px;
  border-style: solid;
  border-image: url("https://i.imgur.com/8xftJ3v.gif") 7 fill round;
}

.container{
  border: #ae957f 1px dotted;
  padding: 8px;
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/dot/02.png);
  background-size: 4%;
}

.header{
  padding: 4px;
  border: #ae957f 1px dotted;
  border-bottom: hidden;
  background: white;
}

#headerimg{
  border: #ae957f 1px dotted;
  background: url(https://i.pinimg.com/1200x/4f/83/4a/4f834ae4f237bb0c3eb2c482aca35fd1.jpg);
  background-size: 100%;
  height: 75px;
  display: flex;
  align-items: center;
}
#headerimg p{
  font-size: 32px;
  letter-spacing: 2px;
  color: beige;
  -webkit-text-stroke: #ae957f 2px;
  paint-order: stroke;
  margin-left: 12px;
  font-weight: bold;
}

.innerbody{ display: flex; flex-direction: row; }

.content{
  width: 575px;
  border: #ae957f 1px dashed;
  border-top: hidden;
  background: white;
  padding: 8px;
}

.sidebar{
  width: 270px;
  padding: 8px;
  border-right: #ae957f 1px dotted;
  border-bottom: #ae957f 1px dotted;
  background: white;
  padding-top: 12px;
}

#heading{
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/plaid/10.png);
  -webkit-text-stroke: white 5px;
  paint-order: stroke;
  font-weight: bold;
  padding: 4px;
  border: #ae957f 1px dotted;
  border-left: hidden;
  border-right: hidden;
}

/* ── game player ── */
.playerbox{
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/stripe/02.png);
  background-size: 15%;
  border: #ae957f 1px dotted;
  padding: 4px;
}
#game-frame{
  border: #ae957f 1px dotted;
  background: #111;
  width: 100%;
  height: 340px;
  position: relative;
  overflow: hidden;
}
#game-frame ruffle-player{ width: 100% !important; height: 100% !important; }
#game-frame .placeholder{
  color: #ccc;
  font-size: 12px;
  font-style: italic;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
}
#game-frame > div{ width: 100%; height: 100%; }

#now-playing{
  background: white;
  border: #ae957f 1px dotted;
  padding: 8px;
  margin-top: 4px;
  font-size: 12px;
}
#now-playing strong{ letter-spacing: 1px; }
#now-playing .hint{
  display: block;
  margin-top: 4px;
  font-size: 10px;
  opacity: 0.7;
}

/* ── sidebar game list ── */
#sidecontent{
  width: 95%;
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/stripe/02.png);
  background-size: 30%;
  border: #ae957f 1px dotted;
  padding: 4px;
  margin-bottom: 8px;
}
#sideboxtext{ margin-left: 16px; }
#sidecontent a{ color: #ae957f; }
#sidebox{
  background: white;
  border: #ae957f 1px dotted;
  border-top: hidden;
  padding: 4px;
}
.game-link{
  cursor: pointer;
}
.game-link.active{
  color: #a1ceed;
  font-weight: bold;
}

#footer{
  text-align: center;
  padding: 8px;
  border: #ae957f 1px dotted;
  border-top: hidden;
  background: white;
  font-size: 10px;
}
</style>
<link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/happy-cinnamoroll-eea44ff2-32.css">
</head>
<body>

<div class="outerlace">
  <div class="container">

    <div class="header">
      <div id="headerimg">&ensp;<i><p>Happy Gaming!</p></i></div>
    </div>

    <div class="innerbody">

      <div class="content">
        <div class="playerbox">
          <div id="game-frame">
            <div class="placeholder">pick a game from the list ♡</div>
          </div>
        </div>
        <div id="now-playing">
          now playing: <strong id="np-title">nothing yet</strong>
          <span class="hint" id="np-hint"></span>
        </div>
      </div>

      <div class="sidebar">
        <div class="scrollbar">
          <div id="sidecontent">

            <div id="heading">❀ flash games</div>
            <div id="sidebox">
              <div id="sideboxtext">&ensp;
                <a class="game-link" data-type="swf" data-title="Dice Mogul" data-src="dice.swf">dice mogul</a>
              </div>
            </div>
            <div id="sidebox">
              <div id="sideboxtext">&ensp;
                <a class="game-link" data-type="swf" data-title="Game Two" data-src="game2.swf">game two — rename me</a>
              </div>
            </div>

            <div id="heading">❀ disc games</div>
            <div id="sidebox">
              <div id="sideboxtext">&ensp;
                <a class="game-link" data-type="iso" data-core="psx" data-title="PS1 Game — rename me"
                   data-src="https://archive.org/download/barbie-as-the-princess-and-the-pauper-pc/Barbie%20As%20The%20Princess%20And%20The%20Pauper.iso">ps1 game — rename me</a>
              </div>
            </div>
            <div id="sidebox">
              <div id="sideboxtext">&ensp;
                <a class="game-link" data-type="iso" data-core="gba" data-title="GBA Game — rename me"
                   data-src="https://archive.org/download/barbie_the_princess-and-the-pauper/Barbie%20-%20The%20Princess%20and%20the%20Pauper.gba">gba game — rename me</a>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

    <div id="footer">☆ made with love, one game at a time ☆</div>

  </div>
</div>

<script>
window.RufflePlayer = window.RufflePlayer || {};
let currentRufflePlayer = null;

function clearFrame() {
  const frame = document.getElementById("game-frame");
  frame.innerHTML = "";
  currentRufflePlayer = null;
  return frame;
}

function loadSwf(src, title) {
  const frame = clearFrame();

  const ruffle = window.RufflePlayer.newest();
  if (!ruffle) {
    frame.innerHTML = '<div class="placeholder">ruffle failed to load — check your connection</div>';
    return;
  }

  currentRufflePlayer = ruffle.createPlayer();
  frame.appendChild(currentRufflePlayer);
  currentRufflePlayer.load(src);

  document.getElementById("np-hint").textContent = "";
}

function loadIso(src, core, title) {
  const frame = clearFrame();

  const iframe = document.createElement("iframe");
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.style.border = "none";
  
  // Security clearance setup allowing cross-origin redirects from Archive.org
  iframe.setAttribute("allowfullscreen", "true");
  iframe.setAttribute("allow", "autoplay; gamepad");
  iframe.setAttribute("referrerpolicy", "no-referrer-when-downgrade");

  frame.appendChild(iframe);

  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write('<!DOCTYPE html><html><head><style>html,body,#ejs-target{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;}</style></head><body><div id="ejs-target"></div></body></html>');
  doc.close();

  iframe.contentWindow.EJS_player = '#ejs-target';
  iframe.contentWindow.EJS_core = core;
  iframe.contentWindow.EJS_gameUrl = src;
  iframe.contentWindow.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
  iframe.contentWindow.EJS_startOnLoaded = true; 

  const scr = doc.createElement('script');
  scr.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
  doc.body.appendChild(scr);

  document.getElementById("np-hint").textContent = "large file — first load may take a bit ♡";
}

function loadGame(link) {
  const type = link.dataset.type;
  const src = link.dataset.src;
  const title = link.dataset.title;

  if (type === "iso") {
    loadIso(src, link.dataset.core, title);
  } else {
    loadSwf(src, title);
  }

  document.getElementById("np-title").textContent = title;
  document.querySelectorAll(".game-link").forEach(el => el.classList.remove("active"));
  link.classList.add("active");
}

window.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".game-link").forEach(link => {
    link.addEventListener("click", (e) => {
      e.preventDefault();
      loadGame(link);
    });
  });

  const first = document.querySelector(".game-link");
  if (first) loadGame(first);
});
</script>

</body>
</html>
