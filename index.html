<!DOCTYPE html>
<html>
<head>
    <title>Our Arcade</title>
    <!-- Correctly load the online Ruffle player from the CDN -->
    <script src="https://unpkg.com"></script>
    <style>
        /* This ensures the game player expands and is visible on screen */
        #game-container {
            width: 100%;
            height: 600px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Happy Gaming!</h1>
    
    <!-- Container for the Flash game -->
    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            
            // Loads your uploaded "dice.swf" file
            player.load("dice.swf"); 
        });
    </script>
</body>
</html>
