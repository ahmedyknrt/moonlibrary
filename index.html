<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>˚ʚ♡ɞ˚ our arcade</title>

<style>
html{
  image-rendering: pixelated;
  filter: contrast(80%);
  background: url(https://i.pinimg.com/736x/df/cb/f6/dfcbf62db587f25f91ca5d811ff88153.jpg);
  background-size: 10%;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  width: 800px;
  margin: 0 auto;
  margin-top: 25px;
  margin-bottom: 25px;
  line-height: 16px;
  font-size: 16px;
  letter-spacing: 1px;
  font-family: "ms pgothic", sans-serif;
  color: #ae957f;
  text-align: justify;
  background: transparent;
}

::-webkit-scrollbar { display: none; }
.scrollbar{ scrollbar-width: none; -ms-overflow-style: none; }

a{ color: #c49dae; text-decoration: none; }
a:hover{ color: #a1ceed; letter-spacing: 3px; transition: 0.2s; }

.outerlace{
  border-width: 5px;
  border-style: solid;
  border-image: url("https://i.imgur.com/8xftJ3v.gif") 7 fill round;
}

.container{
  border: #ae957f 1px dotted;
  padding: 8px;
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/dot/02.png);
  background-size: 4%;
}

.header{
  padding: 4px;
  border: #ae957f 1px dotted;
  border-bottom: hidden;
  background: white;
}

#headerimg{
  border: #ae957f 1px dotted;
  background: url(https://i.pinimg.com/1200x/4f/83/4a/4f834ae4f237bb0c3eb2c482aca35fd1.jpg);
  background-size: 100%;
  height: 75px;
  display: flex;
  align-items: center;
}
#headerimg p{
  font-size: 32px;
  letter-spacing: 2px;
  color: beige;
  -webkit-text-stroke: #ae957f 2px;
  paint-order: stroke;
  margin-left: 12px;
  font-weight: bold;
}

.content{
  border: #ae957f 1px dashed;
  border-top: hidden;
  background: white;
  padding: 12px;
}

#heading{
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/plaid/10.png);
  -webkit-text-stroke: white 5px;
  paint-order: stroke;
  font-weight: bold;
  padding: 4px;
  border: #ae957f 1px dotted;
  margin-top: 14px;
  margin-bottom: 8px;
}
#heading:first-child{ margin-top: 0; }

/* ── catalog grid ── */
.grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.card{
  border: #ae957f 1px dotted;
  background: url(https://blueberrymuffinss.neocities.org/media/backgrounds/stripe/02.png);
  background-size: 15%;
  padding: 5px;
  display: block;
}

.card .thumb{
  width: 100%;
  aspect-ratio: 1 / 1;
  border: #ae957f 1px dotted;
  background: white;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card .thumb img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card .thumb .noimg{
  font-size: 10px;
  color: #ae957f;
  text-align: center;
  padding: 4px;
}

.card .label{
  background: white;
  border: #ae957f 1px dotted;
  border-top: hidden;
  margin: 0 -1px;
  padding: 4px;
  font-size: 12px;
  text-align: center;
  color: #ae957f;
}
.card:hover .label{ color: #a1ceed; }
.card .tag{
  display: block;
  font-size: 9px;
  opacity: 0.7;
  margin-top: 2px;
  letter-spacing: 0;
}

#footer{
  text-align: center;
  padding: 8px;
  border: #ae957f 1px dotted;
  border-top: hidden;
  background: white;
  font-size: 10px;
}
</style>
<link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/happy-cinnamoroll-eea44ff2-32.css">
</head>
<body>

<div class="outerlace">
  <div class="container">

    <div class="header">
      <div id="headerimg">&ensp;<i><p>Happy Gaming!</p></i></div>
    </div>

    <div class="content">

      <div id="heading">❀ flash games</div>
      <div class="grid">

        <a class="card" href="play.html?type=swf&src=dressup.swf&title=50%27s%20Fashion%20Dress%20Up">
          <div class="thumb">
            <img src="thumbs/dressup.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'add thumbs/dressup.png ♡'}))">
          </div>
          <div class="label">50's fashion dress up<span class="tag">flash</span></div>
        </a>
         <a class="card" href="play.html?type=iso&core=nds&src=strawberry.nds&title=strawberry">
          <div class="thumb">
            <img src="thumbs/barbie12.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'add thumbs/barbie12.png ♡'}))">
          </div>
          <div class="label">Barbie 12 Dancing Princesses<span class="tag">nds</span></div>
        </a>


        <a class="card" href="play.html?type=swf&src=game2.swf&title=Game%20Two">
          <div class="thumb">
            <img src="thumbs/game2.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'add thumbs/game2.png ♡'}))">
          </div>
          <div class="label">game two<span class="tag">flash</span></div>
        </a>

      </div>

      <div id="heading">❀ disc games</div>
      <div class="grid">

        <a class="card" href="play.html?type=iso&core=nds&src=barbie12.nds&title=Barbie%2012%20Dancing%20Princesses">
          <div class="thumb">
            <img src="thumbs/barbie12.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'add thumbs/barbie12.png ♡'}))">
          </div>
          <div class="label">Barbie 12 Dancing Princesses<span class="tag">nds</span></div>
        </a>

        <a class="card" href="play.html?type=iso&core=gba&src=barbie_pauper.gba&title=Barbie%20Princess%20%26%20Pauper">
          <div class="thumb">
            <img src="thumbs/barbie_pauper.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'add thumbs/barbie_pauper.png ♡'}))">
          </div>
          <div class="label">Barbie Princess &amp; Pauper<span class="tag">gba</span></div>
        </a>

      </div>

    </div>

    <div id="footer">☆ made with love, one game at a time ☆</div>

  </div>
</div>

</body>
</html>
